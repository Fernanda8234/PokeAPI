<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="./img/icon/game.png">
    <link href="https://fonts.google.com/specimen/Poppins" rel="stylesheet">
    <link rel="stylesheet" href="./css/resete.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./app.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
</head>
<body>
    <header>
        <img class="pokeHeader1" src="./img/header/bulbasaur.png" alt="">
        <img class="logo" src="./img/header/pokemon.png" alt="">
        <img class="pokeHeader2" src="./img/header/pikachu.png" alt="">
    </header>
    <main>
        <div class="pesquisar">
            <input id="pesquisar" type="text" placeholder="Pesquisar Pokémon">
            <span id="destaque">Pokémon em destaque</span>
        </div>
        <div class="conteudoMain">
            <div class="pokemon">
                <img id="imagem">
                <h3 id="nome"></h3>
                <h5 id="numero_pokedex"></h5>
            </div>
        <div class="dadosPokemon">
            <div class="caixa2">
                <span>Tipagem</span>
                <p id="tipagem"></p>
                <span>Habilidade</span>
                <p id="habilidade"></p>
            </div>
            <div class="caixa3">
                <span>Descrição da Pokédex</span>
                <p id="descricao"></p>
            </div>
            <div class="caixa4">
                <span>Região</span>
                <p id="regiao"></p>
                <span>Geração</span>
                <p id="geracao"></p>
            </div>
        </div>
    </div>
    </main>
</body>
</html>
